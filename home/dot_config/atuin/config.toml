# ~/.config/atuin/config.toml — managed by chezmoi.

dialect = "us"
auto_sync = false           # opt-in only; flip to true once you log in to a sync server.
update_check = false
sync_frequency = "5m"
search_mode = "fuzzy"
filter_mode = "global"
filter_mode_shell_up_key_binding = "session"
style = "compact"
inline_height = 18
show_preview = true
show_help = true
exit_mode = "return-original"
word_jump_mode = "emacs"
scroll_context_lines = 1
keymap_mode = "vim-insert"
ctrl_n_shortcuts = true
history_filter = [
  "^secret-",
  "^pass ",
  "^aws-vault ",
]
