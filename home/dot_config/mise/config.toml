# ~/.config/mise/config.toml — managed by chezmoi.
# Per-user defaults. Project overrides live in `.mise.toml` at the repo root.

[settings]
experimental = true
status.show_tools = true
status.show_env = false

[tools]
node    = "lts"
python  = "3.13"
go      = "1.23"
rust    = "stable"
deno    = "latest"
bun     = "latest"

[env]
# Common per-language environment hygiene.
PYTHONDONTWRITEBYTECODE = "1"
PIP_REQUIRE_VIRTUALENV  = "true"
NPM_CONFIG_FUND         = "false"
CARGO_NET_GIT_FETCH_WITH_CLI = "true"
